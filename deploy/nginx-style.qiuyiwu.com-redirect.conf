# style.qiuyiwu.com → 301 永久重定向到 opendesign.cc
# 保留 $request_uri 让深链接（#/sites/...、#/tags/... 等）也能正确转过去
# 替换 /etc/nginx/sites-available/style.qiuyiwu.com 即可
# 旧站文件 /var/www/style.qiuyiwu.com/ 可以保留也可以删，nginx 不再读它

server {
    listen 80;
    listen [::]:80;
    server_name style.qiuyiwu.com;
    return 301 https://opendesign.cc$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name style.qiuyiwu.com;

    ssl_certificate     /etc/letsencrypt/live/style.qiuyiwu.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/style.qiuyiwu.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://opendesign.cc$request_uri;
}
