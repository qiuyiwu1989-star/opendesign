# nginx config for opendesign.cc + www.opendesign.cc
# Install path: /etc/nginx/sites-available/opendesign.cc
# Then: sudo ln -sf /etc/nginx/sites-available/opendesign.cc /etc/nginx/sites-enabled/
# TLS: sudo certbot --nginx -d opendesign.cc -d www.opendesign.cc --non-interactive --agree-tos -m hi@opendesign.cc --redirect

server {
    listen 80;
    listen [::]:80;
    server_name opendesign.cc www.opendesign.cc;

    # HTTP → HTTPS（cerbot 已加，这里保留作 docs）
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name opendesign.cc www.opendesign.cc;

    ssl_certificate     /etc/letsencrypt/live/opendesign.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/opendesign.cc/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # UTF-8 charset：让 .txt / .xml / .css / .js / .svg 都带 charset=utf-8
    # 避免中文 llms.txt / robots.txt / sitemap.xml 被浏览器猜成 GBK 乱码
    charset utf-8;
    charset_types text/plain text/css text/xml application/javascript application/json image/svg+xml;

    root /var/www/opendesign.cc;
    index index.html;

    # /packs/ 子目录：DESIGN_SPEC.md 作为目录默认 index（AI agent 拿 folder URL 即取规范）
    # 没 spec 文件时 autoindex 列出整个目录，方便 agent 选具体文件下载
    location ^~ /packs/ {
        index DESIGN.md DESIGN_SPEC.en.md DESIGN_SPEC.md;
        autoindex on;
        autoindex_format html;
        autoindex_exact_size off;
        autoindex_localtime on;
        add_header Cache-Control "public, max-age=3600";
        add_header Access-Control-Allow-Origin "*";
    }

    # 多语言 SEO 静态详情页 ——
    # /en/sites/apple → /en/sites/apple.html  (静态 HTML，Google 友好)
    # 优先匹配语言路径，没命中再 fallback 到 SPA
    location ~ ^/(en|zh-CN|zh-TW|ja|ko)/sites/([a-z0-9][a-z0-9-]*)/?$ {
        try_files $uri.html $uri/index.html /index.html;
    }

    # /en/ /ja/ ... 语言首页：暂时也跳 SPA（首页本来就检测 lang 切换）
    location ~ ^/(en|zh-CN|zh-TW|ja|ko)/?$ {
        try_files $uri/index.html /index.html;
    }

    # SPA fallback（hash routing 仍工作）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 经常变的代码 / 数据：max-age=0 强制每次条件请求（etag/304 控制）
    # 这样部署新版本后用户立即能拿到，没变时只走 304 没有 body 传输开销
    location ~* \.(css|js|mjs|json)$ {
        expires off;
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    # 不常变的资源：长缓存 + immutable
    location ~* \.(png|jpg|jpeg|gif|webp|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        try_files $uri =404;
    }

    # 安全 headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # CSP（白名单含 Baidu Analytics + Google Analytics 4）
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://*.baidu.com https://www.googletagmanager.com 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co https://api.microlink.io https://iad.microlink.io https://*.baidu.com https://www.googletagmanager.com https://*.google-analytics.com https://*.analytics.google.com; form-action 'self'; frame-ancestors 'self'; base-uri 'self';" always;

    # gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    server_tokens off;

    access_log /var/log/nginx/opendesign.cc.access.log;
    error_log  /var/log/nginx/opendesign.cc.error.log;
}
