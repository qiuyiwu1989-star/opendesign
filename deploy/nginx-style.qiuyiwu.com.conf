# nginx config for style.qiuyiwu.com
# Install path on server: /etc/nginx/sites-available/style.qiuyiwu.com
# Then: sudo ln -s /etc/nginx/sites-available/style.qiuyiwu.com /etc/nginx/sites-enabled/
# Test: sudo nginx -t
# Reload: sudo systemctl reload nginx
# TLS: sudo certbot --nginx -d style.qiuyiwu.com  (会自动补 listen 443 + cert 路径)

server {
    listen 80;
    listen [::]:80;
    server_name style.qiuyiwu.com;

    root /var/www/style.qiuyiwu.com;
    index index.html;

    # SPA fallback：所有非文件路径都回 index.html（让前端 hash router 接管）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源加长缓存
    location ~* \.(css|js|png|jpg|jpeg|gif|webp|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, must-revalidate";
        try_files $uri =404;
    }

    # 安全 headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    # 允许：Google Fonts / jsdelivr CDN（Supabase SDK）/ microlink / Supabase / xiaomimimo
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co https://api.microlink.io https://iad.microlink.io;" always;

    # gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # 隐藏 nginx 版本
    server_tokens off;

    access_log /var/log/nginx/style.qiuyiwu.com.access.log;
    error_log  /var/log/nginx/style.qiuyiwu.com.error.log;
}
