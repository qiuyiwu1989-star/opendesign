# nginx config for opendesign.cc + www.opendesign.cc
# Install path: /etc/nginx/sites-available/opendesign.cc
# Then: sudo ln -sf /etc/nginx/sites-available/opendesign.cc /etc/nginx/sites-enabled/
# TLS: sudo certbot --nginx -d opendesign.cc -d www.opendesign.cc --non-interactive --agree-tos -m hi@opendesign.cc --redirect

server {
    listen 80;
    listen [::]:80;
    server_name opendesign.cc www.opendesign.cc;

    # HTTP → HTTPS（cerbot 已加，这里保留作 docs）
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name opendesign.cc www.opendesign.cc;

    ssl_certificate     /etc/letsencrypt/live/opendesign.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/opendesign.cc/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # UTF-8 charset：让 .txt / .xml / .css / .js / .svg 都带 charset=utf-8
    # 避免中文 llms.txt / robots.txt / sitemap.xml 被浏览器猜成 GBK 乱码
    charset utf-8;
    charset_types text/markdown text/plain text/css text/xml application/javascript application/json image/svg+xml;

    root /var/www/opendesign.cc;
    index index.html;

    # /packs/ 设计包资源：优先走腾讯云 COS，COS 缺失/异常时回退本机目录。
    # 保持 /packs/<slug>/ 语义：继续返回该包的 DESIGN.md，避免 Agent URL 失效。
    location ^~ /packs/ {
        rewrite ^/packs/([^/]+)/$ /packs/$1/DESIGN.md break;

        proxy_ssl_server_name on;
        proxy_ssl_name opendesign-1254041526.cos.ap-shanghai.myqcloud.com;
        proxy_set_header Host opendesign-1254041526.cos.ap-shanghai.myqcloud.com;
        proxy_set_header Connection "";
        proxy_http_version 1.1;

        proxy_intercept_errors on;
        error_page 403 404 500 502 503 504 = @packs_local;

        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=3600" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header X-OpenDesign-Asset-Source "cos" always;

        proxy_pass https://opendesign-1254041526.cos.ap-shanghai.myqcloud.com;
    }

    # 远程 MCP（Streamable HTTP）：反代到本机常驻 node 进程（systemd: opendesign-mcp-http）。
    # 只读、无状态、数据本来就公开——不属于暂停中的内容流水线，常驻服务和 nginx 本身一个性质。
    location ^~ /mcp/http {
        proxy_pass http://127.0.0.1:8787/mcp/http;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
        add_header Access-Control-Allow-Origin "*" always;
    }

    location @packs_local {
        root /var/www/opendesign.cc;
        index DESIGN.md DESIGN_SPEC.en.md DESIGN_SPEC.md;
        autoindex on;
        autoindex_format html;
        autoindex_exact_size off;
        autoindex_localtime on;
        add_header Cache-Control "public, max-age=3600" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header X-OpenDesign-Asset-Source "local-fallback" always;
    }

    # 多语言 SEO 静态详情页 ——
    # /en/sites/apple → /en/sites/apple.html  (静态 HTML，Google 友好)
    # 优先匹配语言路径，没命中再 fallback 到 SPA
    location ~ ^/(en|zh-CN|zh-TW|ja|ko)/sites/([a-z0-9][a-z0-9-]*)/?$ {
        try_files $uri.html $uri/index.html /index.html;
    }

    # /en/ /ja/ ... 语言首页：暂时也跳 SPA（首页本来就检测 lang 切换）
    location ~ ^/(en|zh-CN|zh-TW|ja|ko)/?$ {
        try_files $uri/index.html /index.html;
    }

    # SPA fallback（hash routing 仍工作）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 代码文件（版本随部署更新）：强制每次条件请求，保证立即拿新版
    location ~* \.(css|js|mjs)$ {
        expires off;
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    # JSON 数据文件：1h 本地缓存 + 后台刷新（返回访者 0 字节传输）
    # sites-index / sites-specs / sites-i18n / packs-index 每次部署才变
    # 404 走独立的 @json_404，绝不能让 expires/add_header 碰到 404 响应——
    # 见下面图片块的注释，同一个坑（2026-07-14 根治过）。
    location ~* \.json$ {
        try_files $uri @json_404;
        add_header Cache-Control "public, max-age=3600, stale-while-revalidate=86400" always;
        add_header Access-Control-Allow-Origin "*" always;
    }
    location @json_404 {
        add_header Access-Control-Allow-Origin "*" always;
        return 404;
    }

    # 不常变的资源：长缓存 + immutable
    # 关键：404 必须走独立的 @image_404 location，完全不经过 expires/add_header。
    # nginx 的 expires 指令不看状态码，任何状态都会被打上缓存头；哪怕 add_header 去掉
    # always 也没用（expires 自己就够）。之前的写法导致图片缺失时的 404 也被打上
    # "immutable, max-age=30天"，浏览器把"这张图当时没有"记 30 天，哪怕服务器端后来
    # 把图补上了，用户也刷不出来——这是卡图长期空白的真凶（彻底根治：2026-07-14）。
    location ~* \.(png|jpg|jpeg|gif|webp|svg|ico|woff2?)$ {
        try_files $uri @image_404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }
    location @image_404 {
        return 404;
    }

    # 安全 headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Access-Control-Allow-Origin "*" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # CSP（白名单含 Baidu Analytics + Google Analytics 4）
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://*.baidu.com https://www.googletagmanager.com 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co https://api.microlink.io https://iad.microlink.io https://*.baidu.com https://www.googletagmanager.com https://*.google-analytics.com https://*.analytics.google.com; form-action 'self'; frame-ancestors 'self'; base-uri 'self';" always;

    # gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_vary on;
    gzip_proxied any;

    server_tokens off;

    access_log /var/log/nginx/opendesign.cc.access.log;
    error_log  /var/log/nginx/opendesign.cc.error.log;
}
